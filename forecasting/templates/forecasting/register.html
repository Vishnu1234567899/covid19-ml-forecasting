{% extends 'forecasting/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center py-4" style="background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="text-center text-white mb-4">
          <i class="fas fa-virus fa-2x mb-2" style="color: #e94560;"></i>
          <h3 class="fw-bold">COVID-19 Forecasting System</h3>
        </div>
        <div class="card p-4 shadow-lg">
          <h4 class="fw-bold mb-4 text-center">Create Account</h4>
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-danger py-2">{{ msg }}</div>
            {% endfor %}
          {% endif %}
          <form method="POST">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" name="first_name" class="form-control" required/>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" required/>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required/>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Mobile</label>
                <input type="text" name="mobile" class="form-control"/>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Country</label>
                <input type="text" name="country" class="form-control"/>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">State</label>
                <input type="text" name="state" class="form-control"/>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">City</label>
                <input type="text" name="city" class="form-control"/>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
              <i class="fas fa-user-plus me-2"></i>Register
            </button>
          </form>
          <hr/>
          <p class="text-center mb-0">Already have an account? <a href="{% url 'login' %}" style="color: #e94560;" class="fw-bold">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
